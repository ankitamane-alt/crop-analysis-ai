<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI-Based Crop Image Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#2E7D32,#66BB6A);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    width: 600px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #2E7D32;
}

button {
    background-color: #2E7D32;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.result-box {
    margin-top: 25px;
    padding: 20px;
    background: #F1F8E9;
    border-radius: 10px;
}

.disease {
    font-size: 22px;
    font-weight: bold;
    color: #D32F2F;
}

.healthy {
    color: #2E7D32;
}

img {
    margin-top: 15px;
    max-width: 100%;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="card">

<h1>🌾 AI-Based Real-Time Crop Image Analytics</h1>

<input type="file" id="fileInput">
<br><br>
<button onclick="analyzePlant()">Analyze Plant</button>

<div id="result" class="result-box" style="display:none;">
    <p id="predictionText" class="disease"></p>
    <p id="confidenceText"></p>
    <img id="previewImage">
</div>

<footer>
Developed by Ankita Mane | AI Crop Insurance Project
</footer>

</div>

<script>
function analyzePlant() {
    const fileInput = document.getElementById("fileInput");
    const result = document.getElementById("result");
    const predictionText = document.getElementById("predictionText");
    const confidenceText = document.getElementById("confidenceText");
    const previewImage = document.getElementById("previewImage");

    if (fileInput.files.length === 0) {
        alert("Please upload an image");
        return;
    }

    const file = fileInput.files[0];

    // Show image preview
    previewImage.src = URL.createObjectURL(file);

    // Fake AI prediction (demo)
    const predictions = [
        "Healthy Leaf",
        "Leaf Spot Disease",
        "Powdery Mildew",
        "Rust Disease"
    ];

    const randomPrediction = predictions[Math.floor(Math.random() * predictions.length)];
    const confidence = (Math.random() * 20 + 80).toFixed(2);

    if (randomPrediction.toLowerCase().includes("healthy")) {
        predictionText.className = "disease healthy";
        predictionText.innerText = "Plant Status: " + randomPrediction;
    } else {
        predictionText.className = "disease";
        predictionText.innerText = "Detected Disease: " + randomPrediction;
    }

    confidenceText.innerText = "Confidence: " + confidence + "%";

    result.style.display = "block";
}
</script>

</body>
</html>
