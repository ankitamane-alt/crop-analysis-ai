<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Crop Insurance Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1B5E20,#66BB6A);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:650px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

h1{
color:#2E7D32;
margin-bottom:10px;
}

.subtitle{
color:gray;
margin-bottom:25px;
}

.upload-box{
border:2px dashed #66BB6A;
padding:25px;
border-radius:15px;
background:#F1F8E9;
cursor:pointer;
}

input[type="file"]{
display:none;
}

button{
margin-top:20px;
background:linear-gradient(45deg,#2E7D32,#66BB6A);
color:white;
border:none;
padding:14px 30px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

footer{
margin-top:20px;
font-size:13px;
color:gray;
}
</style>
</head>

<body>

<div class="container">

<h1>🌾 AI Crop Image Analytics</h1>
<p class="subtitle">Upload plant image for insurance-based disease analysis</p>

<label class="upload-box">
📤 Click to Upload Plant Image
<input type="file" id="fileInput" accept="image/*">
</label>

<br>

<button onclick="analyzeCrop()">Analyze Crop</button>

<footer>
Developed by Ankita Mane
</footer>

</div>

<script>
function analyzeCrop(){

const fileInput = document.getElementById("fileInput");

if(fileInput.files.length === 0){
alert("Please upload image first");
return;
}

const file = fileInput.files[0];
const imageURL = URL.createObjectURL(file);

/* Save image for result page */
localStorage.setItem("plantImage", imageURL);

/* Redirect to result page */
window.location.href = "result.html";

}
</script>

</body>
</html>
