<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analysis Result</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1B5E20,#66BB6A);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:35px;
width:700px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
text-align:center;
}

h1{ color:#2E7D32; }

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:#F1F8E9;
padding:15px;
border-radius:12px;
}

img{
margin-top:20px;
width:320px;
border-radius:12px;
}

button{
margin-top:20px;
padding:12px 25px;
background:linear-gradient(45deg,#2E7D32,#66BB6A);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>🌾 Crop Analysis Result</h1>

<div class="grid">

<div class="box">
<b>Disease</b><br>
<span id="prediction"></span>
</div>

<div class="box">
<b>Damage</b><br>
<span id="damage"></span>%
</div>

<div class="box">
<b>Confidence</b><br>
<span id="confidence"></span>%
</div>

<div class="box">
<b>Insurance Risk</b><br>
<span id="risk"></span>
</div>

<div class="box" style="grid-column: span 2;">
<b>Suggested Treatment</b><br>
<span id="treatment"></span>
</div>

</div>

<img id="image">

<br>

<a href="index.html">
<button>Analyze Another Plant</button>
</a>

</div>

<script>
/* Fake AI values (demo) */
const diseases = [
"Healthy Leaf",
"Leaf Spot",
"Rust Disease",
"Powdery Mildew"
];

const treatments = {
"Healthy Leaf":"No treatment required",
"Leaf Spot":"Apply copper fungicide",
"Rust Disease":"Use sulfur spray",
"Powdery Mildew":"Use neem oil spray"
};

const prediction = diseases[Math.floor(Math.random()*diseases.length)];
const damage = Math.floor(Math.random()*40)+10;
const confidence = (Math.random()*15+85).toFixed(2);
const risk = damage > 30 ? "High" : "Low";
const treatment = treatments[prediction];

/* Set values */
document.getElementById("prediction").innerText = prediction;
document.getElementById("damage").innerText = damage;
document.getElementById("confidence").innerText = confidence;
document.getElementById("risk").innerText = risk;
document.getElementById("treatment").innerText = treatment;

/* Get image from local storage */
const imageData = localStorage.getItem("plantImage");
if(imageData){
document.getElementById("image").src = imageData;
}
</script>

</body>
</html>
