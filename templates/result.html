<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f4f4f4;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
        }
        img {
            margin-top: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>🌱 Crop Disease Prediction Result</h2>

        <h3>🧾 Disease: {{ prediction }}</h3>

        <img src="{{ image }}" width="300">

        <h3>📊 Confidence: {{ confidence }}%</h3>

        <h3>⚠ Damage Level: {{ damage }}%</h3>

        <h3>🚨 Risk Level: {{ risk }}</h3>

        <h3>💊 Treatment:</h3>
        <p>{{ treatment }}</p>

        <br>
        <a href="/">🔙 Go Back</a>
    </div>

</body>
</html>
